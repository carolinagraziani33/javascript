<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@300;400;600&display=swap"
        rel="stylesheet">
    <title>Conversor de Moedas</title>
    <!-- Google Analytics -->

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4ZRKVPZ4YL"></script>

    <script>

        window.dataLayer = window.dataLayer || [];

        function gtag() { dataLayer.push(arguments); }

        gtag('js', new Date());

        gtag('config', 'G-4ZRKVPZ4YL');

    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Roboto:wght@100..900&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <img class="img" src="Assets/money.webp">
    <!-- BOTÃO FLUTUANTE -->
    <button class="btn-anuncio" onclick="abrirFormulario()">
        📢 Anuncie aqui
    </button>


    <!-- MODAL -->
    <div class="modal-anuncio" id="modalAnuncio">

        <div class="modal-conteudo">

            <span class="fechar" onclick="fecharFormulario()">×</span>

            <h2>Anuncie no Conversor</h2>

            <form action="https://formcarry.com/s/GEsOLUTBdcj" method="POST" enctype="multipart/form-data">

                <label>Nome</label>
                <input type="text" name="nome" required>

                <label>Telefone</label>
                <input type="tel" name="telefone" id="telefone" required>

                <label>Email</label>
                <input type="email" name="email" required>

                <label>Tipo de anúncio</label>

                <select name="tipo-anuncio" required>

                    <option value="">Selecione</option>
                    <option value="restaurantes">Restaurantes</option>
                    <option value="passeios">Passeios turísticos</option>
                    <option value="hoteis">Hotéis</option>
                    <option value="lazer">Lazer</option>
                    <option value="financas">Finanças</option>
                    <option value="ecológico">Projetos ecológicos</option>
                    <option value="outros">Outros</option>

                </select>

                <button type="submit">Enviar proposta</button>

            </form>

        </div>

    </div>

    <div class="main-container">

        <div class="left-column">

            <div class="history-box">
                <h3>Últimas conversões</h3>
                <ul id="history-list"></ul>
                <button id="clear-history">Apagar histórico</button>
            </div>

            <div class="chart-box">
                <h3>Gráfico</h3>
                <canvas id="currencyChart"></canvas>
                <p id="chart-message"></p>
                <button id="clear-chart">Limpar gráfico</button>
            </div>

        </div>


        <main>

            <button id="theme-toggle">🌙 Tema</button>

            <label>
                Converter <b>de</b>
                <select class="select-from"></select>
                <button class="swap">🔄</button>
            </label>

            <label>
                Converter <b>para</b>
                <select class="select"></select>
            </label>

            <label>
                Valor
                <input class="input-currency" placeholder="R$ 10.000,00">
            </label>

            <button class="button">Converter</button>

            <button id="copy-result">Copiar resultado</button>

            <p id="exchange-rate"></p>

            <section>

                <div class="currency-box">

                    <img class="img1" id="currency-from-img">

                    <p class="currency" id="currency-from-name">Real</p>

                    <p class="currencyvalue">R$0,00</p>

                </div>

                <img class="img1" src="Assets/seta.webp">

                <div class="currency-box">

                    <img class="img1" id="currency-img">

                    <p class="currency" id="currency-name">Dólar</p>

                    <p class="currencyvalue2">U$0,00</p>

                </div>

                <p id="loading" class="loading">Carregando cotação...</p>

            </section>

        </main>

        <div class="right-column">

            <div class="fact-box">

                <h3>Curiosidade</h3>
                <p id="currency-fact"></p>

            </div>

            <div class="eco-box" id="eco-box">

                <h3 id="eco-title">Cidade ecológica</h3>

                <ul class="eco-list" id="eco-list"></ul>

            </div>

        </div>
    </div>

    <script src="js/script.js"></script>

</body>

</html>
