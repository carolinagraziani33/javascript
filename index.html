<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Divertido</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

</head>

<body>
    <img class="img" src="./Assets/money.webp" alt="">
    <main>
        <label>
            Converter <b>de</b>
            <select>
                <option>R$ Real Brasileiro</option>

            </select>

        </label>
        <label>
            Converter <b>para</b>
           <select class="select"></select>

        </label>
        <label>
            Valor
            <input class="input-currency" placeholder="R$ 10.000,00">
        </label>
        <button class="button">Converter</button>
        <section>
            <div class="currency-box"><img class="img1" src="./Assets/real.jpg" alt="moedaLogoAconverter">
                <p class="currency">Real</p>
                <p class="currencyvalue">R$0,00</p>
            </div>
            <img class="img1" src="./Assets/seta.webp" alt="seta">
            <div class="currency-box">
                <img id="currency-img" class="img1" src="./Assets/dolar.avif">
                <p class="currency" id="currency-name">Dolar</p>
                <p class="currencyvalue2">U$0,00</p>
            </div>

        </section>
    </main>
    <script src="./java.js"></script>
</body>

</html>
